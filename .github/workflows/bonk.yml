name: Bonk

on:
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]

jobs:
  bonk:
    if: github.event.sender.type != 'Bot'
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: write
      issues: write
      pull-requests: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Run Bonk
        uses: ask-bonk/ask-bonk/github@main
        env:
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
        with:
          model: "openrouter/openai/gpt-5.3-codex"
          mentions: "/bonk,@ask-bonk"
          prompt: |
            Review this PR for bugs, security issues, logic flaws, and style. You must format your response EXACTLY following this structure:

            **Bonk Summary**
            Write a concise paragraph summarizing the PR's core improvements. Quantify changes where possible (e.g., lines duplicated/removed, files consolidated, architectural shifts).

            **Issues to Address**
            List actionable issues to address before merging. If none, state "None". Format strictly as:
            * **[Brief Issue Title]** — [Detailed description of the issue, the file/line it occurs on, and the potential impact (e.g., silent failure, type-safety gap)].

            **Confidence Score: [X]/5**
            Provide a score from 1 to 5 based on the safety and quality of the code.

            **Merge Recommendation**
            State clearly if it is safe to merge, conditional on which specific issues being fixed. Provide a brief rationale summarizing the risk level of the findings.

            **Focus Areas**
            List the specific files the human reviewer should pay closest attention to, alongside the specific reason why (e.g., "Pay close attention to src/components/x.tsx (clipboard error UX)").
            
            Maintain a highly technical, objective, and analytical tone. Do not use filler introductions. Follow the repository's existing conventions.

